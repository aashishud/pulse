Key Elements of Brand Identity:

                        a: `Branding is not merely a marketing exercise; it is a fundamental pillar of modern capitalism that provides immense, tangible value to both the firm that owns the brand and the consumer who purchases it. For firms, the primary importance of branding lies in differentiation and financial security. In a marketplace overflowing with identical commodities, a brand is the only thing that prevents a product from competing solely on a race-to-the-bottom price war. A strong brand establishes "brand equity," an intangible but highly valuable asset that increases the company's overall market valuation. Furthermore, it creates trade leverage, builds formidable barriers to entry for new competitors, and allows the firm to charge a premium price because customers perceive higher value. Strong brands also enjoy reduced marketing costs over time because the loyalty of the customer base generates steady, organic revenue.

For consumers, branding serves entirely different but equally crucial psychological and functional purposes. Foremost, branding simplifies the decision-making process. Faced with hundreds of choices on a supermarket shelf, a trusted brand name acts as a mental shortcut (heuristic) guaranteeing a specific standard of quality. This drastically reduces the consumer's "perceived risk"-be it financial, physical, or social risk. Beyond functionality, brands provide immense social and emotional value. Through the "Customer Reflection" facet of a brand, consumers use brands to construct and express their own identity. Buying an eco-friendly brand allows a consumer to feel responsible, while buying a luxury brand allows them to project status. Therefore, the brand fulfills deep psychological needs that the raw product alone could never satisfy.

Importance to Firms:
- Differentiation & Pricing Power: Escaping commodity status and charging premium prices.
- Financial Asset: Building measurable brand equity that adds to the company's total valuation.
- Market Resilience: Fostering customer loyalty that acts as a buffer against competitive attacks.

Importance to Consumers:
- Decision Simplification: Providing mental shortcuts that speed up purchasing choices.
- Risk Reduction: Guaranteeing consistent quality and reducing the fear of a bad purchase.
- Identity Construction: Allowing consumers to express their values, status, and self-image.`
                    },
                    {
                        q: "24. Integrated Marketing Programs (IMC) & Promotion",
                        a: `An Integrated Marketing Communication (IMC) program is the strategic coordination of all the various promotional methods and marketing mix elements (Product, Price, Place, Promotion) to ensure that a brand communicates a unified, consistent message to the consumer. In the modern era, marketing cannot rely on a single channel. To build brand equity, brand managers must orchestrate every touchpoint. This begins with the Product Strategy, which must deliver not just functional performance, but also process benefits (ease of access) and relationship benefits (personalized service). Following this, the Pricing Strategy must be carefully calibrated to reflect the perceived value and quality of the brand, ensuring it sits within the correct "price band" for its target market.

The core of IMC, however, lies in Brand Promotion. Brand promotion is the mechanism used to inform, remind, and persuade consumers about the brand's unique features. To execute an effective IMC campaign, a brand manager will deploy a synchronized mix of promotion methods. This includes Point-of-Sale Promotions (placing impulse buys near checkout counters), Product Giveaways (offering free trials for edibles or toiletries to lower the barrier to entry), and Social Media Promotion (engaging consumers on a personal, non-aggressive level). Other crucial methods include Organizing Contests, Customer Referral Programs, and linking the brand to Causes and Charity, which induces feelings of goodwill. When all these methods speak with the same voice, the brand builds a formidable presence in the market.

Criteria for Developing an IMC Program:
- Product & Pricing Synchronization: Ensuring the product's actual quality perfectly matches its price tag and marketing claims.
- Multi-Channel Consistency: Delivering the exact same brand message across TV, social media, print, and in-store displays.
- Diverse Promotional Tactics: Utilizing giveaways, point-of-sale displays, referral incentives, and charitable tie-ins to engage consumers from multiple angles.`
                    },
                    {
                        q: "25. Brand Reinforcement & Revitalization",
                        a: `Brands are living entities; they do not maintain their market position automatically. Even after achieving massive success, a brand must undergo constant Brand Reinforcement to maintain its brand equity and keep the brand alive in the minds of both existing and new consumers. Brand reinforcement is a defensive strategy aimed at the growth and maturity stages of the product life cycle. It ensures that consumers retain the desired knowledge structures and associations. Marketers reinforce brands through continuous, creative marketing programs. This includes regular Advertising to remind consumers of the product's long-lasting benefits, sponsoring Events to create positive mental imagery, participating in Exhibitions to provide tangible product experiences, and optimizing Showroom Layouts to strengthen brand appeal at the retail level.

However, despite excellent reinforcement, brands may suffer due to uncontrollable external factors like intense new competition, rapid technological advancements, globalization, or shifts in consumer tastes. When profits fall drastically and the brand begins to decay, the company must execute Brand Revitalization. Revitalization is an offensive turnaround strategy. It requires a deep organizational commitment to change. To successfully revitalize a brand, the leadership must conduct exhaustive research to understand current consumer perceptions, re-establish the brand promise, improve the overall customer experience, and rapidly innovate the product or service. This often involves complete rebranding, entering new markets, and over-communicating the new brand positioning to both employees and the public to rebuild trust.

Brand Reinforcement (Maintenance):
- Goal: Retain current equity and remind consumers of brand benefits.
- Methods: Consistent advertising, event sponsorships, showroom optimization, and promotional discounts.

Brand Revitalization (Turnaround):
- Goal: Reclaim lost equity and reverse declining profits due to market shifts or technological obsolescence.
- Methods: Deep consumer research, drastic product innovation, repositioning, and complete rebranding efforts.`
                    },
                    {
                        q: "26. Branding for Global Markets",
                        a: `Venturing into global markets is an inevitable stage of growth for ambitious brands. A brand achieves "global" status when it is visible, recognized, and sold across international borders. However, a brand cannot simply copy and paste its domestic strategy into a foreign market. To succeed globally, a brand manager must meticulously adapt the brand to suit various cultural, economic, and political environments. The market landscape varies wildly: developing countries often experience rapid economic growth where consumers are highly brand-conscious and aspirational, whereas developed markets in the USA and Europe are mature, requiring brands to stimulate entirely new desires and experiences.

Before a brand transits from local to global, the management team must conduct exhaustive audits of the target country. Foremost is the Culture of Consumers, which includes understanding local values, customs, symbols, language nuances, and behavioral tones. A marketing message that is humorous in one country might be deeply offensive in another. Additionally, the Economic Status of the country must be evaluated-this includes assessing the power supply, infrastructure, and the buying power of the average consumer. Finally, the brand must navigate the Political and Legal Environment, ensuring that the product and its advertising comply with local regulations and trademarks. When executed correctly, global branding allows a company to achieve massive scale while competing head-to-head with other transnational giants.

Crucial Aspects of Global Branding:
- Cultural Adaptation: Tailoring brand messages to align with local values, customs, and languages.
- Economic Assessment: Pricing products according to local buying power and utilizing available infrastructure.
- Legal Compliance: Navigating foreign laws, regulations, and trademark restrictions.
- Market Maturity Adjustments: Using different strategies for rapidly growing developing markets versus saturated developed markets.`
                    },
                    {
                        q: "27. Brand Product Matrix / Growth Strategy",
                        a: `As companies evolve, they must make strategic decisions regarding how to map their brands to their products. This architectural decision-making process is best visualized using the Brand Growth Matrix, a 2x2 framework that categorizes growth strategies based on whether the brand name and the product category are existing or new. This matrix helps brand managers minimize risk while maximizing market share.

The matrix outlines four distinct growth trajectories:

1. Line Extension (Existing Brand, Existing Product Category): This is the safest route. A company launches a variation of an existing product under the parent brand, such as adding a new flavor, package size, or shape (e.g., Diet Coke or Cherry Coke).

2. Brand Extension (Existing Brand, New Product Category): The company uses its established brand name to enter a completely different market category (e.g., ITC extending from cigarettes to Sunfeast cookies and Bingo chips). This leverages brand trust but carries the risk of brand dilution if the new product fails.

3. Multi-Brand (New Brand, Existing Product Category): The company launches a new brand name in a category it already operates in. This strategy targets different consumer segments or price points within the same market, capturing more shelf space and boxing out competitors.

4. New Brand (New Brand, New Product Category): The most resource-intensive strategy. The company enters an unknown market with a completely new brand identity, shielding its existing brands from any potential failure in the new venture.

The Four Strategies of the Matrix:
- Line Extension: Same brand, same category (e.g., new flavors or sizes).
- Brand Extension: Same brand, new category (leveraging trust into new markets).
- Multi-Brand: New brand, same category (targeting different demographics in a familiar market).
- New Brand: New brand, new category (high risk, high reward diversification).`
                    }
                ]
            },
            {
                section: "SECTION 4: COMPREHENSIVE CASE STUDIES",
                items: [
                    {
                        q: "CASE STUDY 1: Esbeda - Brand Extension & Personality Shift",
                        a: `Background: Esbeda is a prominent Indian brand renowned for its extensive collection of PU and leather handbags, wallets, and pouches targeted specifically at women. Positioned as an accessible luxury brand, Esbeda has successfully captured a loyal demographic by offering elegant, high-quality, and fashion-forward accessories that mimic premium international styles at relatively affordable price points. However, to sustain long-term business growth and maximize its established brand equity, the brand's management team is exploring avenues for strategic expansion.

1. Suggest an appropriate brand extension for the expansion of the brand. (5 Marks)
Proposed Extension: Premium Women's Footwear and Travel Luggage. For a brand extension to be successful, it must adhere to the principles of "Product Similarity" and "Target Group Resemblance." Extending Esbeda into the Premium Women's Footwear and Chic Travel Luggage categories represents a highly logical and synergistic move.

Rationale: Handbags and footwear are highly complementary fashion categories; women frequently coordinate their bags with their shoes. By entering the footwear market, Esbeda capitalizes entirely on its existing target audience. Furthermore, the manufacturing processes and raw materials (leather, high-quality PU, hardware, zippers) required for footwear and travel luggage are practically identical to those used for handbags. This allows Esbeda to leverage its existing supplier relationships, distribution channels, and retail showroom layouts, resulting in immense cost savings and manufacturing efficiencies. By offering matching luggage sets and heels, Esbeda transitions from being just an accessory brand to a comprehensive lifestyle brand.

2. What is the current brand personality and suggest a new personality based on the Big Five Scale/Aaker's Dimensions? (5 Marks)
Current Brand Personality: Using David Aaker's brand personality framework, Esbeda currently embodies "Sophistication." The brand is perceived as elegant, feminine, glamorous, and status-oriented. It caters heavily to formal wear, office environments, and traditional social gatherings.

Suggested New Personality: Shifting towards "Excitement" and "Competence." To capture the massive, younger demographic of Gen Z and millennials-and to support the new extension into travel luggage-Esbeda must modernize its personality. While retaining its core of sophistication, the brand should inject traits of Excitement (daring, spirited, imaginative, and trendy) and Competence (reliable, intelligent, and successful).

Rationale: By becoming more "Exciting," Esbeda appeals to a younger, more adventurous consumer who travels frequently and values bold, contemporary fashion over rigid traditional elegance. By highlighting "Competence," the brand assures consumers that their new footwear and travel luggage are not just beautiful, but highly durable, functional, and reliable for the modern, fast-paced woman. This dual-personality shift makes the brand aspirational for the young, independent traveler.

3. Suggest a Brand Ambassador for the brand. (5 Marks)
Proposed Brand Ambassador: Deepika Padukone or Alia Bhatt. Selecting a brand ambassador requires evaluating the celebrity against the critical determinants of endorsement success: Credibility, Attractiveness, Similarity, Liking, and Familiarity.

Rationale: A leading Bollywood actress like Deepika Padukone perfectly bridges Esbeda's current "Sophistication" with its new "Exciting/Competent" personality.
- Attractiveness & Liking: She possesses immense physical and intellectual attractiveness, and is universally liked across diverse Indian demographics.
- Familiarity & Similarity: She is highly familiar to the target audience. As an independent, successful woman who travels globally, she embodies the exact lifestyle that Esbeda's target consumer aspires to achieve.
- Expertise: Because she is recognized as a global fashion icon, consumers will perceive her as having high "Expertise" and trustworthiness regarding fashion choices. If she endorses Esbeda's new footwear and luggage line, her massive fan base will immediately associate the new extension with premium quality and high fashion, ensuring rapid market acceptance.`
                    },
                    {
                        q: "CASE STUDY 2: Apple - Premium and Innovation Positioning",
                        a: `Background: Apple Inc. stands as one of the most valuable and recognized brands in human history. Operating in the hyper-competitive global technology sector, Apple has consistently defied the standard industry practice of competing on price and hardware specifications. Instead, it has built an empire based on design, user experience, and a tightly controlled ecosystem. This approach has generated a level of brand resonance-specifically attitudinal attachment and behavioral loyalty that borders on tribalism.

a) Identify Apple's positioning strategy. Why is premium pricing effective? (8 Marks)
Positioning Strategy: Apple employs a rigorous Premium + Innovation-Based positioning strategy. Using the standard positioning formula: For lifestyle-conscious consumers and creative professionals, Apple is the cutting-edge technology brand that gives the most seamless, beautiful, and intuitive user experience because of its closed ecosystem and uncompromising commitment to minimalist design. Apple does not position itself as a seller of computers or phones; it positions itself as an enabler of human creativity and a symbol of modern luxury. They focus heavily on the "Customer Reflection" face of the identity prism-owning an Apple product signals to others that the user is stylish, affluent, and creative.

The Effectiveness of Premium Pricing: In traditional economics, higher prices reduce demand. However, Apple utilizes premium pricing strategically to trigger psychological biases in the consumer's mind.
- Signal of Superiority: When consumers cannot easily evaluate the complex internal hardware of a device, they use price as a heuristic (mental shortcut) for quality. Apple's high prices inherently convince the buyer that the product is superior to cheaper Android alternatives.
- Aspirational Value & Exclusivity: Premium pricing creates a barrier to entry, turning the iPhone or MacBook into a Veblen good (a luxury item where demand increases as price increases). It makes the brand aspirational; people desire it precisely because not everyone can afford it.
- Funding R&D: The massive profit margins generated by premium pricing allow Apple to heavily reinvest in research, development, and high-end retail experiences, creating a self-sustaining loop of innovation that competitors operating on razor-thin margins cannot match.

b) Suggest four IMC (Integrated Marketing Communications) tools Apple uses to maintain brand prestige. (7 Marks)
To maintain its elite status, Apple eschews traditional, loud marketing in favor of highly controlled, aesthetic communications.

1. Experiential Retail (The Apple Store): Apple revolutionized retail by treating its physical stores as temples to the brand rather than mere sales floors. Located in premium real estate with minimalist glass-and-steel architecture, the stores encourage consumers to touch and play with the devices freely. Instead of commissioned salespeople pushing products, they employ "Geniuses" who act as tech-savvy guides, enhancing the "Relationship" facet of their brand identity. (Focus: Sensory engagement, zero-pressure environments, and premium customer service).

2. High-Impact Event Marketing (The Keynote): Apple turned standard corporate press releases into global cultural events. The Apple Keynote (pioneered by Steve Jobs) is a masterclass in event marketing. By keeping product details fiercely secret until the live presentation, Apple generates unparalleled media buzz, speculation, and free PR. The events are theatrical, focusing on emotional storytelling rather than technical jargon. (Focus: Generating anticipation, earning free global PR, and framing product launches as cultural milestones).

3. Minimalist Print & Digital Advertising: Apple's advertising is instantly recognizable due to its stark simplicity. Campaigns like "Shot on iPhone" rely entirely on massive, beautiful, user-generated photographs displayed on towering billboards with almost no text. This communicates extreme confidence in the product's performance. The ads focus entirely on the emotional benefit (capturing beautiful memories) rather than listing camera megapixels. (Focus: Visual dominance, emotional resonance, and extreme simplicity that cuts through visual clutter).

4. Strategic Product Placement: Apple invests heavily in ensuring its products are the devices of choice for protagonists in movies, high-end television shows, and music videos. You will rarely see an Apple logo hidden in media; the glowing Apple on the back of a laptop in a movie silently communicates that the character is successful, creative, or intelligent. This subconsciously reinforces the brand's premium reflection in the culture. (Focus: Subconscious cultural embedding, associating the brand with successful and creative media figures).`
                    },
                    {
                        q: "CASE STUDY 3: Dove - Real Beauty Positioning",
                        a: `Background: In the early 2000s, the beauty and personal care industry was saturated with advertisements featuring heavily airbrushed, unachievable standards of beauty using supermodels. Dove, a Unilever brand, was selling a basic commodity: a moisturizing beauty bar. To escape the commodity trap and differentiate itself in a highly crowded market, Dove took a massive risk. They conducted a global study revealing that only 2% of women around the world described themselves as beautiful. Realizing the toxicity of the industry they were part of, Dove completely overhauled their brand identity.

a) What type of repositioning strategy did Dove adopt? Explain. (8 Marks)
Repositioning Strategy: Dove adopted a Purpose-Driven and Emotional Repositioning strategy. They shifted their brand from being product-centric (focusing on the functional benefit of 1/4 moisturizing cream) to being deeply consumer-centric and cause-oriented. Using the positioning formula: For everyday women, Dove is the personal care brand that champions real, natural beauty, giving women increased self-esteem and confidence, because it explicitly rejects toxic industry standards and celebrates inclusivity.

Explanation of the Strategy: By abandoning supermodels and featuring everyday women of various ages, sizes, ethnicities, and skin conditions (freckles, wrinkles, scars), Dove completely altered the "Culture" and "Brand Personality" facets of their identity. This repositioning was incredibly effective because it struck a deep, emotional chord with a frustrated consumer base. It transformed the brand from a manufacturer of soap into a social crusader for women's self-esteem. This created an incredibly strong "Attitudinal Attachment" (Resonance). Consumers began purchasing Dove not just because it was a good soap, but because buying Dove felt like casting a vote for a positive social cause, thereby building immense brand loyalty and global trust.

b) Suggest four IMC (Integrated Marketing Communications) tools Dove should use to sustain its purpose-driven image. (7 Marks)
To sustain a purpose-driven image, Dove must ensure its communications feel authentic and community-focused, avoiding anything that looks like traditional, manipulative advertising.

1. Content Marketing and Video Storytelling: Dove's most powerful tool is emotional video content that bypasses traditional ad slots. For example, their "Real Beauty Sketches" campaign (where an FBI sketch artist drew women as they described themselves versus how strangers described them) went viral globally because it told a compelling psychological story. Dove must continue to produce short, documentary-style films for YouTube that explore themes of self-esteem and body positivity, generating organic sharing and emotional connection. (Focus: High emotional impact, viral shareability, and psychological storytelling over product pushing).

2. Public Relations (PR) & Educational Initiatives: To prove their commitment goes beyond selling soap, Dove must use PR to implement real-world social change. This involves tools like the "Dove Self-Esteem Project." By partnering with schools, child psychologists, and NGOs to provide free workshops and educational materials for young girls about body positivity, Dove generates authentic, highly positive media coverage and cements its reputation as a socially responsible corporate citizen. (Focus: Authenticity, grassroots community involvement, and earning positive news media coverage).

3. Social Media & User-Generated Content (UGC): Dove's message relies on democratizing beauty, making social media the perfect IMC tool. Dove should continually launch hashtag campaigns (such as the #ShowUs campaign) that encourage everyday consumers to post unedited, unfiltered photos of themselves. By highlighting and re-posting these real women on Dove's official channels, the brand actively builds a "Sense of Community" and validates the consumer's self-image. (Focus: Community engagement, validating the consumer, and leveraging organic reach).

4. Print & Out-of-Home (OOH) Advertising: While video is for storytelling, OOH advertising (billboards, magazine spreads, transit ads) acts as a powerful visual disruptor. Dove should purchase massive billboard space in high-traffic, fashion-centric areas (like Times Square or fashion magazines) and display stark, un-retouched portraits of diverse women. Crucially, these ads should feature minimal text and a clear "No Digital Distortion" mark, acting as a bold, unavoidable contrast to the airbrushed fashion ads surrounding them. (Focus: Visual disruption, mass awareness, and reinforcing the brand's stance against digital alteration).`
                    }
                ]
            }
        ];

        // --- APP LOGIC ---
        const contentContainer = document.getElementById('content-container');
        const synth = window.speechSynthesis;
        let currentUtterance = null;
        let currentCard = null;

        // Strip some markdown-like characters purely for cleaner speech, but keep text intact
        function cleanTextForSpeech(text) {
            return text.replace(/\*/g, '');
        }

        // Render the UI
        function renderStudyMaterial() {
            studyData.forEach((section, secIndex) => {
                // Section Header
                const sectionEl = document.createElement('div');
                sectionEl.className = 'mb-10';
                sectionEl.innerHTML = `<h2 class="text-xl font-extrabold text-violet-800 border-b-2 border-violet-200 pb-2 mb-4 uppercase tracking-wide">${section.section}</h2>`;
                
                // Section Items
                section.items.forEach((item, itemIndex) => {
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-lg shadow-sm border border-gray-200 p-5 mb-4 transition-all duration-200';
                    card.id = `card-${secIndex}-${itemIndex}`;
                    
                    const qHeader = document.createElement('div');
                    qHeader.className = 'flex justify-between items-start gap-4 mb-3';
                    qHeader.innerHTML = `
                        <h3 class="font-bold text-lg text-gray-900 leading-tight flex-1">${item.q}</h3>
                        <button class="play-btn bg-violet-100 hover:bg-violet-200 text-violet-700 p-3 rounded-full flex-shrink-0 transition focus:outline-none shadow-sm" title="Play / Pause Audio">
                            <i class="fas fa-play"></i>
                        </button>
                    `;
                    
                    const answerText = document.createElement('div');
                    answerText.className = 'text-gray-700 text-base leading-relaxed whitespace-pre-line';
                    // We render the exact text to the screen
                    answerText.textContent = item.a;

                    card.appendChild(qHeader);
                    card.appendChild(answerText);
                    
                    // Add click event to play button
                    const playBtn = card.querySelector('.play-btn');
                    playBtn.addEventListener('click', () => {
                        const textToRead = cleanTextForSpeech(item.q + " ... Answer. ... " + item.a);
                        playAudio(textToRead, card, playBtn);
                    });

                    sectionEl.appendChild(card);
                });

                contentContainer.appendChild(sectionEl);
            });
        }

        // Play / Pause Audio Function
        function playAudio(text, cardElement, btnElement) {
            
            // CASE 1: Clicking the button of the card that is ALREADY active
            if (currentCard === cardElement) {
                if (synth.paused) {
                    // It was paused, so RESUME
                    synth.resume();
                    btnElement.innerHTML = '<i class="fas fa-pause"></i>';
                    btnElement.classList.replace('bg-violet-100', 'bg-violet-600');
                    btnElement.classList.replace('text-violet-700', 'text-white');
                    
                    cardElement.classList.add('playing-highlight');
                    cardElement.classList.remove('paused-highlight');
                    return;
                } else if (synth.speaking) {
                    // It is currently speaking, so PAUSE
                    synth.pause();
                    btnElement.innerHTML = '<i class="fas fa-play"></i>';
                    // Keep the button blue to indicate it's still the active card, just paused
                    btnElement.classList.replace('bg-violet-600', 'bg-violet-100');
                    btnElement.classList.replace('text-white', 'text-violet-700');
                    
                    cardElement.classList.remove('playing-highlight');
                    cardElement.classList.add('paused-highlight');
                    return;
                }
            }

            // CASE 2: Clicking a DIFFERENT card, or nothing was playing
            synth.cancel(); // Completely stop whatever was playing before

            // Reset UI for all cards
            document.querySelectorAll('.playing-highlight, .paused-highlight').forEach(el => {
                el.classList.remove('playing-highlight', 'paused-highlight');
            });
            document.querySelectorAll('.play-btn').forEach(btn => {
                btn.innerHTML = '<i class="fas fa-play"></i>';
                btn.classList.add('bg-violet-100', 'text-violet-700');
                btn.classList.remove('bg-violet-600', 'text-white');
            });

            // Setup new speech utterance
            currentUtterance = new SpeechSynthesisUtterance(text);
            
            // Get selected speed
            const speed = parseFloat(document.getElementById('speed').value);
            currentUtterance.rate = speed;

            // Try to find a good English voice
            const voices = synth.getVoices();
            const preferredVoice = voices.find(v => v.lang.includes('en-') && (v.name.includes('Google') || v.name.includes('Natural')));
            if(preferredVoice) currentUtterance.voice = preferredVoice;

            // UI updates during speech
            currentUtterance.onstart = () => {
                currentCard = cardElement;
                cardElement.classList.add('playing-highlight');
                btnElement.innerHTML = '<i class="fas fa-pause"></i>';
                btnElement.classList.replace('bg-violet-100', 'bg-violet-600');
                btnElement.classList.replace('text-violet-700', 'text-white');
            };

            currentUtterance.onend = () => {
                cardElement.classList.remove('playing-highlight', 'paused-highlight');
                btnElement.innerHTML = '<i class="fas fa-play"></i>';
                btnElement.classList.replace('bg-violet-600', 'bg-violet-100');
                btnElement.classList.replace('text-white', 'text-violet-700');
                currentCard = null;
            };

            currentUtterance.onerror = (e) => {
                if (e.error !== 'canceled' && e.error !== 'interrupted') {
                    console.error("Speech Synthesis Error:", e);
                }
            };

            // Start speaking
            synth.speak(currentUtterance);
        }

        // Stop All Button
        document.getElementById('stop-all').addEventListener('click', () => {
            synth.cancel();
            document.querySelectorAll('.playing-highlight, .paused-highlight').forEach(el => {
                el.classList.remove('playing-highlight', 'paused-highlight');
            });
            document.querySelectorAll('.play-btn').forEach(btn => {
                btn.innerHTML = '<i class="fas fa-play"></i>';
                btn.classList.add('bg-violet-100', 'text-violet-700');
                btn.classList.remove('bg-violet-600', 'text-white');
            });
            currentCard = null;
        });

        // Speed Change Listener (requires restarting the speech)
        document.getElementById('speed').addEventListener('change', (e) => {
             if((synth.speaking || synth.paused) && currentUtterance) {
                 const textToSpeak = currentUtterance.text;
                 const activeCard = currentCard;
                 const activeBtn = activeCard.querySelector('.play-btn');
                 
                 // Restart the audio to apply new speed
                 playAudio(textToSpeak, activeCard, activeBtn);
             }
        });

        // Initialize voices
        window.speechSynthesis.onvoiceschanged = () => {};
        
        renderStudyMaterial();

        // Handle page unload to stop audio
        window.addEventListener('beforeunload', () => {
            synth.cancel();
        });
    </script>
</body>
</html>
